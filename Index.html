<!DOCTYPE html>
<html>
<head>
    <title>Medicine Reminder & Health Tracker</title>
</head>
<body>
    <h1>Medicine Reminder & Health Tracker</h1>

    <form action="/add_medicine" method="POST">
        <label>Medicine Name:</label>
        <input type="text" name="medicine_name" required><br><br>

        <label>Dosage:</label>
        <input type="text" name="dosage" required><br><br>

        <label>Reminder Time:</label>
        <input type="time" name="reminder_time" required><br><br>

        <button type="submit">Add Medicine</button>
    </form>
</body>
</html>
